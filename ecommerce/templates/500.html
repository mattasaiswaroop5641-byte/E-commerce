<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Server Error</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #0b0b0c; color: #f2f2f2; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 56px 20px; }
    .card { background: #141416; border: 1px solid #2a2a2e; border-radius: 14px; padding: 22px; }
    h1 { margin: 0 0 10px 0; font-size: 22px; }
    p { margin: 10px 0; color: #c9c9cf; line-height: 1.45; }
    code { background: #0f0f11; border: 1px solid #2a2a2e; padding: 2px 6px; border-radius: 8px; color: #f2f2f2; }
    a { color: #9ecbff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Internal Server Error</h1>
      <p>Something went wrong while processing your request.</p>
      <p>Error id: <code>{{ error_id }}</code></p>
      <p><a href="/">Return to home</a></p>
    </div>
  </div>
</body>
</html>
